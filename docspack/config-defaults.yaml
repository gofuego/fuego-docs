# Config defaults contributed by the docs pack. The site's config.yaml is
# deep-merged on top of these, so anything here can be overridden.
taxonomies:
  tags:
    path: "/tags/{term}"
    layout: "tag"
    index_path: "/tags"
    index_layout: "tag-index"

collections:
  tutorials:
    match: "docs/tutorials/**"
    sort_by: "order"
    layout: "listing"
    path: "/tutorials"
    page_size: 1
