name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    # Dual-hosted: fuego-pages (studio) + gh-pages (public GitHub Pages).
    permissions:
      contents: write
    uses: gofuego/.github/.github/workflows/fuego-deploy.yml@main
    with:
      studio_base: /gofuego/fuego-docs
      pages_base: /fuego-docs
